services:
  postgres:
    image: postgres:15
    container_name: buyer_portal_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: buyer_portal

    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./server
    container_name: buyer_portal_backend
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./client
    container_name: buyer_portal_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
volumes:
  postgres_data:
